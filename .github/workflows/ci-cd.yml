name: "Production CI/CD with DB Protection"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Permissions required for GitHub Pages and OIDC
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # --- STAGE 1, 2, 3 & 4: Build and Security Analysis ---
  build-and-scan:
    name: Build and Analyze
    runs-on: ubuntu-latest
    outputs:
      build_dir: ${{ steps.detect_dir.outputs.build_dir }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarCloud analysis

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      # Stack Detection & Build Logic
      - name: Detect Stack and Build
        run: |
          if [ -f "package.json" ]; then
            echo "Detected Node.js project"
            npm install
            npm run build --if-present
          elif [ -f "requirements.txt" ]; then
            echo "Detected Python project"
            pip install -r requirements.txt
          elif [ -f "pom.xml" ]; then
            echo "Detected Java (Maven) project"
            mvn clean install -DskipTests
          elif ls *.sln 1> /dev/null 2>&1; then
            echo "Detected .NET project"
            dotnet build
          else
            echo "No standard stack detected. Running generic build..."
          fi

      - name: Determine Build Directory
        id: detect_dir
        run: |
          if [ -d "dist" ]; then
            echo "build_dir=dist" >> $GITHUB_OUTPUT
            echo "Found dist directory"
          elif [ -d "build" ]; then
            echo "build_dir=build" >> $GITHUB_OUTPUT
            echo "Found build directory"
          elif [ -d "out" ]; then
            echo "build_dir=out" >> $GITHUB_OUTPUT
            echo "Found out directory"
          elif [ -d "public" ]; then
            echo "build_dir=public" >> $GITHUB_OUTPUT
            echo "Found public directory"
          else
            echo "build_dir=." >> $GITHUB_OUTPUT
            echo "Using root directory"
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: ${{ steps.detect_dir.outputs.build_dir }}
          retention-days: 1

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}

  # --- STAGE 5, 6 & 7: DB Change Detection & Backup ---
  database-protection:
    name: Database Protection
    needs: build-and-scan
    runs-on: ubuntu-latest
    # Only run backup on actual merges/pushes to main to avoid redundant backups on PRs
    if: github.event_name == 'push' 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Detect if DB related files have changed using git diff
      - name: Detect DB Changes
        id: db_check
        run: |
          DB_PATTERNS="migrations/|db/|schema/|sql/|prisma/|alembic/|flyway/"
          # Get the list of changed files between the previous commit and current commit
          # Note: On first push, github.event.before might be all zeros
          BEFORE_SHA=${{ github.event.before }}
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA=$(git rev-list --max-parents=0 HEAD)
          fi
          
          CHANGED_FILES=$(git diff --name-only $BEFORE_SHA ${{ github.event.after }} | grep -E "$DB_PATTERNS" || true)
          if [ -n "$CHANGED_FILES" ]; then
            echo "db_changed=true" >> $GITHUB_OUTPUT
            echo "Detected changes in: $CHANGED_FILES"
          else
            echo "db_changed=false" >> $GITHUB_OUTPUT
            echo "No DB changes detected."
          fi

      - name: Azure Login
        if: steps.db_check.outputs.db_changed == 'true'
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Automated Database Backup (CSV)
        if: steps.db_check.outputs.db_changed == 'true'
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          FILENAME="backup_${{ github.ref_name }}_${{ github.run_number }}_${TIMESTAMP}.csv"
          mkdir -p db-backups
          
          echo "DB changes detected. Initiating safety backup: $FILENAME"
          
          # Mocking a successful export for YAML validation
          echo "id,data,vibe_check" > db-backups/$FILENAME
          echo "1,Sample Data,Protected" >> db-backups/$FILENAME
          
          # Upload to Azure Blob Storage using Azure CLI
          az storage blob upload \
            --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} \
            --account-key ${{ secrets.AZURE_STORAGE_KEY }} \
            --container-name ${{ secrets.BLOB_CONTAINER_NAME }} \
            --file db-backups/$FILENAME \
            --name "backups/$(date +'%Y-%m')/$FILENAME" \
            --overwrite
          
          echo "✅ Backup successfully stored in Azure: backups/$(date +'%Y-%m')/$FILENAME"

  # --- STAGE 8: Deploy to GitHub Pages ---
  deploy:
    name: Deploy to GitHub Pages
    needs: [build-and-scan, database-protection]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: ./deployed-site

      - name: Verify Build Output
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing files in ./deployed-site:"
          ls -R ./deployed-site
          if [ ! -d "./deployed-site" ] || [ -z "$(ls -A ./deployed-site)" ]; then
            echo "❌ ERROR: Build output directory './deployed-site' is missing or empty!"
            exit 1
          fi
          echo "✅ Build output verified."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deployed-site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
